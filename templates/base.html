<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ ui.app_name }} &mdash; {{ ui.app_tagline }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-mark">
        <svg viewBox="0 0 48 48" width="34" height="34"><path d="M24 44C24 44 10 34 10 20C10 12 16 6 24 6C32 6 38 12 38 20C38 34 24 44 24 44Z" fill="var(--leaf)"/><path d="M24 40V14" stroke="var(--forest)" stroke-width="2" stroke-linecap="round"/><path d="M24 20L17 15M24 26L31 20M24 32L17 27" stroke="var(--forest)" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="brand-text">{{ ui.app_name }}</span>
    </a>
    <nav class="main-nav">
      <a href="{{ url_for('home') }}" class="{{ 'active' if request.path == '/' else '' }}">{{ ui.nav_home }}</a>
      <a href="{{ url_for('home') }}#crops">{{ ui.nav_crops }}</a>
      <a href="{{ url_for('disease_home') }}" class="{{ 'active' if '/disease' in request.path else '' }}">{{ ui.nav_disease }}</a>
      <a href="{{ url_for('fertilizers') }}" class="{{ 'active' if request.path == '/fertilizers' else '' }}">{{ ui.nav_fertilizers }}</a>
      <a href="{{ url_for('machinery') }}" class="{{ 'active' if request.path == '/machinery' else '' }}">{{ ui.nav_machinery }}</a>
      <a href="{{ url_for('prices') }}" class="{{ 'active' if request.path == '/prices' else '' }}">{{ ui.nav_prices }}</a>
      <a href="{{ url_for('extra') }}" class="{{ 'active' if request.path == '/extra' else '' }}">{{ ui.nav_extra }}</a>
    </nav>
    <div class="lang-switch" role="group" aria-label="{{ ui.lang_switch }}">
      <a href="{{ url_for('setlang', code='en') }}" class="{{ 'is-current' if lang=='en' else '' }}">EN</a>
      <a href="{{ url_for('setlang', code='te') }}" class="{{ 'is-current' if lang=='te' else '' }}">తె</a>
      <a href="{{ url_for('setlang', code='hi') }}" class="{{ 'is-current' if lang=='hi' else '' }}">हि</a>
    </div>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.main-nav').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">{{ ui.app_name }}</div>
    <div class="footer-text">{{ ui.footer_text }}</div>
    <div class="footer-helpline">Kisan Call Centre: <strong>1800-180-1551</strong></div>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
